<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarLink - Authentication</title>
    <!-- Add SEO Meta Tags -->
    <meta name="description"
        content="Log in or sign up to ScholarLink to personalize your scholarship search.">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar" id="auth-nav">
        <div class="logo">ScholarLink</div>
        <button class="hamburger" id="hamburger" aria-label="Toggle Navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" id="nav-home">Home</a></li>
            <li><a href="scholarships.html" id="nav-scholarships">Scholarships</a></li>
            <li><button class="theme-btn" id="theme-toggle" aria-label="Toggle Theme">🌞</button></li>
            <li><a href="auth.html" class="active profile-icon" id="nav-profile" aria-label="Authenticaion">👤</a></li>
        </ul>
    </nav>
    <main class="container auth-container">
        <div class="auth-card fade-in">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchAuth('login')">Log In</button>
                <button class="auth-tab" id="tab-signup" onclick="switchAuth('signup')">Sign Up</button>
            </div>
            
            <form id="form-login" class="auth-form active" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-h2);">Welcome Back</h2>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-gov auth-btn">Log In</button>
                <p class="auth-hint">Don't have an account? <a href="#" onclick="switchAuth('signup'); return false;">Sign up</a></p>
            </form>

            <form id="form-signup" class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-h2);">Create Account</h2>
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-gov auth-btn">Sign Up</button>
                <p class="auth-hint">Already have an account? <a href="#" onclick="switchAuth('login'); return false;">Log in</a></p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function switchAuth(type) {
            if (type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-signup').classList.remove('active');
                document.getElementById('form-login').classList.add('active');
                document.getElementById('form-signup').classList.remove('active');
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('form-signup').classList.add('active');
                document.getElementById('form-login').classList.remove('active');
            }
        }
    </script>
</body>
</html>
